name: Frontend CI/CD (Dev to Main)

on:
  push:
    branches: [ dev, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies & Build
      env:
        CI: false
      run: |
        npm ci
        npm run build

    # Share built files with the deploy job
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: react-build
        path: |
          build/
          nginx-seo.conf

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: react-build
        path: .

    - name: Clean Old Build Files from Web Root
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: '13.62.50.7'
        username: 'ubuntu'
        key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        script: |
          # Clear all old static files and React bundle hashes
          sudo rm -rf /var/www/html/*

    - name: Copy Build Files to AWS Nginx Web Root
      uses: appleboy/scp-action@v0.1.7
      with:
        host: '13.62.50.7'
        username: 'ubuntu'
        key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        source: "build/*"
        target: "/var/www/html"
        strip_components: 1

    - name: Reload Nginx inside Docker Container via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: '13.62.50.7'
        username: 'ubuntu'
        key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        script: |
          sudo docker exec paperlessboss_nginx nginx -t
          sudo docker exec paperlessboss_nginx nginx -s reload

