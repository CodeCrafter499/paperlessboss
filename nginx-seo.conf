# ─── PaperlessBoss Nginx SEO Configuration ────────────────────────────────────
# Deploy: sudo cp nginx-seo.conf /etc/nginx/sites-available/paperlessboss
#         sudo ln -sf /etc/nginx/sites-available/paperlessboss /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name paperlessboss.com www.paperlessboss.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name paperlessboss.com www.paperlessboss.com;

    root /var/www/html;
    index index.html;

    # ── SSL (managed by Certbot) ─────────────────────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/paperlessboss.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/paperlessboss.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirect www → non-www (canonical)
    # if ($host = www.paperlessboss.com) {
    #     return 301 https://paperlessboss.com$request_uri;
    # }

    # ── Security Headers (also help SEO trust signals) ───────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Gzip compression (faster load = better SEO) ──────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/json application/xml application/rss+xml
        application/atom+xml image/svg+xml
        font/truetype font/opentype application/vnd.ms-fontobject;

    # ── Cache static assets (performance = better Core Web Vitals) ───────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache robots.txt and sitemap ─────────────────────────────────────
    location = /robots.txt {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Serve OG image with correct cache ────────────────────────────────
    location = /og-image.png {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── React SPA routing — serve index.html for all routes ──────────────
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for index.html (so meta tags and JS bundles update)
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }
    }

    # ── Proxy to Backend API (FastAPI) ───────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /validate-excel {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 10M;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Block common exploit paths ────────────────────────────────────────
    location ~ /\.(git|env|htaccess|htpasswd) {
        deny all;
        return 404;
    }
}
